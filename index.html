<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>マルバツゲーム</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }
    .cell {
      width: 100px;
      height: 100px;
      font-size: 40px;
      background: #f0f0f0;
      border: 2px solid #333;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>○×ゲーム</h1>
<p id="status">Xの番</p>

<div class="board" id="board"></div>

<button onclick="resetGame()">リセット</button>

<script>
  const board = Array(9).fill("");
  let currentPlayer = "X";
  let gameOver = false;

  const boardEl = document.getElementById("board");
  const statusEl = document.getElementById("status");

  function render() {
    boardEl.innerHTML = "";
    board.forEach((cell, i) => {
      const div = document.createElement("div");
      div.className = "cell";
      div.textContent = cell;
      div.onclick = () => handleClick(i);
      boardEl.appendChild(div);
    });
  }

  function handleClick(i) {
    if (board[i] || gameOver) return;

    board[i] = currentPlayer;

    if (checkWinner()) {
      statusEl.textContent = currentPlayer + "の勝ち！";
      gameOver = true;
    } else if (!board.includes("")) {
      statusEl.textContent = "引き分け！";
      gameOver = true;
    } else {
      currentPlayer = currentPlayer === "X" ? "O" : "X";
      statusEl.textContent = currentPlayer + "の番";
    }

    render();
  }

  function checkWinner() {
    const patterns = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];
    return patterns.some(p =>
      p.every(i => board[i] === currentPlayer)
    );
  }

  function resetGame() {
    for (let i = 0; i < 9; i++) board[i] = "";
    currentPlayer = "X";
    gameOver = false;
    statusEl.textContent = "Xの番";
    render();
  }

  render();
</script>

</body>
</html>
